# Redirect HTTP to HTTPS and non-www to www
server {
    listen 80;
    server_name codesleuth.ai www.codesleuth.ai;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.codesleuth.ai$request_uri;
    }
}

# Redirect bare domain HTTPS to www
server {
    listen 443 ssl;
    server_name codesleuth.ai;

    ssl_certificate /etc/letsencrypt/live/www.codesleuth.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.codesleuth.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.codesleuth.ai$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name www.codesleuth.ai;

    ssl_certificate /etc/letsencrypt/live/www.codesleuth.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.codesleuth.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Static documentation (agents.v7 HTML — matches styles.css + nav.js)
    location = /docs {
        return 301 /docs/;
    }

    location ^~ /docs/ {
        alias /home/don/sites/codesleuth/docs/;
        index index.html;
    }

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Cache static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache public assets
    location /public/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, max-age=86400";
    }
}
